<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Предупреждение</title>
  <style>
    body {
      margin: 0;
      font-family: "Courier New", monospace;
      background: radial-gradient(circle at center, #1a0000, #000000);
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      max-width: 600px;
      padding: 30px;
      text-align: center;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid #7f1d1d;
      border-radius: 16px;
      box-shadow: 0 0 40px rgba(255, 0, 0, 0.4);
    }

    h1 {
      font-size: 28px;
      color: #ef4444;
      margin-bottom: 20px;
      min-height: 40px;
    }

    p {
      font-size: 15px;
      line-height: 1.6;
      text-align: left;
      min-height: 120px;
    }

    .signature {
      margin-top: 30px;
      font-weight: bold;
      color: #94a3b8;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      background: #ef4444;
      margin-left: 3px;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0; }
    }

    .scan {
      position: absolute;
      width: 100%;
      height: 2px;
      background: rgba(255,0,0,0.4);
      animation: scan 3s linear infinite;
    }

    @keyframes scan {
      0% { top: 0; }
      100% { top: 100%; }
    }
  </style>
</head>
<body>

<div class="scan"></div>

<div class="container">
  <h1 id="title"></h1>
  <p id="text"></p>
  <div class="signature" id="sign">Ваш Дима</div>
</div>

<script>
const titleText = "А если бы вас взломали?";
const mainText = "Дорогие мои родственники, перед тем как заходить на непонятные сайты убедитесь, что ссылку вам отправил не мошенник. В наше время злоумышленники очень хорошо маскируются под знакомых людей, банки и даже государственные сервисы. Достаточно одного неосторожного клика, чтобы потерять доступ к аккаунтам, личным данным или даже деньгам. Всегда проверяйте адрес сайта, не вводите пароли на подозрительных страницах и не переходите по ссылкам из странных сообщений. Лучше лишний раз спросить и убедиться, чем потом восстанавливать доступ и переживать из-за последствий.";

let i = 0;
let j = 0;

function typeTitle() {
  if (i < titleText.length) {
    document.getElementById("title").innerHTML += titleText.charAt(i);
    i++;
    setTimeout(typeTitle, 50);
  } else {
    typeText();
  }
}

function typeText() {
  if (j < mainText.length) {
    document.getElementById("text").innerHTML += mainText.charAt(j);
    j++;
    setTimeout(typeText, 20);
  } else {
    document.getElementById("sign").style.opacity = 1;
  }
}

typeTitle();
</script>

</body>
</html>
